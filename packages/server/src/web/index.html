<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tired-pc</title>
  <link rel="stylesheet" href="./xterm.css" />
  <style>
    :root {
      --bg: #0d0d1a;
      --bg-elev: #1a1a2e;
      --bg-input: #12121f;
      --border: #2a2a3e;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #339af0;
      --ok: #51cf66;
      --warn: #fcc419;
      --err: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      overflow: hidden;
    }
    #app { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .view { flex: 1; overflow-y: auto; padding: 24px; max-width: 900px; width: 100%; margin: 0 auto; }
    .view-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 12px; }
    .view-title { font-size: 24px; font-weight: 700; }
    .view-subtitle { color: var(--text-dim); font-size: 13px; margin-top: 4px; word-break: break-all; }

    button, .btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text-dim); padding: 6px 10px; }
    .btn-danger { background: #2a1a1a; color: var(--err); }
    .btn-cancel { background: #1f1f35; color: var(--text-dim); }

    input, textarea {
      width: 100%; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; color: var(--text); font-size: 14px;
      font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }

    .card {
      background: var(--bg-elev); border-radius: 12px;
      padding: 16px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: background 0.15s;
      gap: 12px;
    }
    .card:hover { background: #20203a; }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-weight: 600; }
    .card-meta { color: var(--text-dim); font-size: 12px; margin-top: 3px; word-break: break-all; }
    .card-arrow { color: #555; font-size: 20px; }

    .dot { width: 8px; height: 8px; border-radius: 4px; display: inline-block; margin-right: 10px; flex-shrink: 0; }
    .dot-starting { background: var(--warn); }
    .dot-running { background: var(--ok); }
    .dot-exited { background: var(--text-dim); }

    .empty { text-align: center; padding: 80px 20px; color: var(--text-dim); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: var(--bg-elev); border-radius: 16px;
      padding: 24px; width: 90%; max-width: 480px;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .field { margin-bottom: 14px; }
    .field-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; display: block; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions > button { flex: 1; }

    .error-banner {
      background: #2a1010; border: 1px solid #3a1515; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 16px; color: #ff9999;
      display: flex; justify-content: space-between; align-items: center;
    }
    .error-banner button { background: transparent; color: var(--err); padding: 0 6px; }

    /* Terminal view */
    .terminal-view { display: flex; flex-direction: column; height: 100%; }
    .terminal-header {
      background: var(--bg); border-bottom: 1px solid var(--bg-elev);
      padding: 10px 16px; display: flex; align-items: center; gap: 12px;
    }
    .terminal-header .back-btn {
      background: transparent; color: var(--accent);
      padding: 4px 8px; font-size: 14px;
    }
    .terminal-header .session-info { flex: 1; display: flex; align-items: center; gap: 8px; }
    .terminal-header .session-label { font-weight: 600; }
    .terminal-host { color: var(--text-dim); font-size: 12px; }
    .terminal-body { flex: 1; background: var(--bg); padding: 8px; overflow: hidden; }
    .terminal-input-bar {
      display: flex; gap: 8px; padding: 10px 16px;
      background: var(--bg); border-top: 1px solid var(--bg-elev);
    }
    .terminal-input-bar input {
      background: var(--bg-input); border: 1px solid var(--border);
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    }

    .toolbar { display: flex; gap: 8px; align-items: center; }

    /* Login */
    .login-card { max-width: 400px; margin: 80px auto; padding: 32px; background: var(--bg-elev); border-radius: 16px; }
    .login-card h1 { font-size: 28px; margin-bottom: 8px; }
    .login-card p { color: var(--text-dim); margin-bottom: 24px; }

    .logout-link { color: var(--text-dim); font-size: 12px; cursor: pointer; background: transparent; padding: 4px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./xterm.js"></script>
  <script src="./main.js"></script>
</body>
</html>
