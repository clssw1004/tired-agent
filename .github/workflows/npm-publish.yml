name: npm Publish

on:
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "20"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROTOCOL_VER=$(node -p "require('./packages/protocol/package.json').version")
          AGENT_VER=$(node -p "require('./packages/agent/package.json').version")
          if [ "$TAG_VERSION" != "$PROTOCOL_VER" ]; then
            echo "ERROR: Tag version v$TAG_VERSION does not match @tired-agent/protocol version $PROTOCOL_VER"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$AGENT_VER" ]; then
            echo "ERROR: Tag version v$TAG_VERSION does not match @tired-agent/agent version $AGENT_VER"
            exit 1
          fi

      - name: Publish @tired-agent/protocol
        run: npm publish -w @tired-agent/protocol --provenance

      - name: Publish @tired-agent/agent
        run: npm publish -w @tired-agent/agent --provenance
